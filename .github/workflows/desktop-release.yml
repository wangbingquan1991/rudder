name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to attach desktop artifacts to, for example v0.1.0 or canary/v0.1.0-canary.1"
        required: true
      source_ref:
        description: "Optional source ref to build from when recovering an existing release tag"
        required: false
  push:
    tags:
      - "v*"
      - "canary/v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            arch: x64
            runner: macos-13
          - platform: macos
            arch: arm64
            runner: macos-14
          - platform: windows
            arch: x64
            runner: windows-latest
          - platform: linux
            arch: x64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref || inputs.release_tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build desktop installer
        env:
          RUDDER_DESKTOP_TARGET_ARCH: ${{ matrix.arch }}
        run: pnpm desktop:dist

      - name: Collect release asset
        id: collect
        run: |
          tag="${{ inputs.release_tag || github.ref_name }}"
          version="${tag##*/}"
          version="${version#v}"
          node scripts/collect-desktop-release-assets.mjs \
            --version "${version}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --out dist/desktop-assets

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/desktop-assets/*
          if-no-files-found: error

  publish:
    name: Attach desktop artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref || inputs.release_tag || github.ref_name }}

      - uses: actions/download-artifact@v4
        with:
          path: dist/desktop-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist/desktop-assets
          shasum -a 256 Rudder-* > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Create or update GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.release_tag || github.ref_name }}"
          notes_file="releases/${tag}.md"

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            if [ -f "${notes_file}" ]; then
              gh release create "${tag}" --title "${tag}" --notes-file "${notes_file}"
            else
              gh release create "${tag}" --title "${tag}" --notes "Desktop artifacts for ${tag}."
            fi
          fi

          gh release upload "${tag}" dist/desktop-assets/Rudder-* dist/desktop-assets/SHASUMS256.txt --clobber
